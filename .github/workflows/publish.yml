name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d0d8abe699bfb85fec6de9f7adb5ae17292296ff  # v4
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9  # v7

      - name: Build package
        run: uv build

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@34e114876b0b11c390a56381ad16ebd13914f8d5  # v1
        with:
          print-hash: true
